# ╔══════════════════════════════════════════════════════════════════╗
# ║         ⚙️ Security Auth Core — GitHub Actions CI Pipeline      ║
# ║                                                                  ║
# ║  [이 파이프라인의 역할]                                           ║
# ║  코드가 Push 또는 PR될 때 자동으로 빌드 및 테스트를 실행합니다.    ║
# ║  main 브랜치의 코드 품질을 보장하기 위한 게이트키퍼 역할입니다.    ║
# ║                                                                  ║
# ║  [트리거 조건]                                                    ║
# ║  - main, dev 브랜치에 Push 시                                    ║
# ║  - main 브랜치로의 Pull Request 시                                ║
# ╚══════════════════════════════════════════════════════════════════╝

name: CI - Build & Test

# ─────────────────────────────────────────────────────────
# 📋 트리거 조건
# ─────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

# ─────────────────────────────────────────────────────────
# 🔒 권한 설정 (최소 권한 원칙)
# contents: read — 코드 읽기 권한만 부여
# ─────────────────────────────────────────────────────────
permissions:
  contents: read

# ─────────────────────────────────────────────────────────
# 🏗️ 빌드 & 테스트 Job 정의
# ─────────────────────────────────────────────────────────
jobs:
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest   # Ubuntu 최신 버전 러너 사용 (무료 2,000분/월)

    steps:
      # Step 1: 코드 체크아웃
      # actions/checkout@v4: 리포지토리 코드를 러너에 다운로드
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      # Step 2: JDK 21 설정
      # Temurin: Eclipse 재단이 관리하는 OpenJDK 배포판 (무료, 안정적)
      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: Gradle 캐시 설정
      # 의존성 다운로드 시간을 절약하기 위해 Gradle 캐시를 활용
      # ~/.gradle/caches: 다운로드된 의존성 JAR 파일
      # ~/.gradle/wrapper: Gradle Wrapper 바이너리
      - name: 📦 Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Step 4: Gradle Wrapper 실행 권한 부여
      - name: 🔧 Grant execute permission for gradlew
        run: chmod +x gradlew

      # Step 5: 빌드 & 테스트 실행
      # --no-daemon: CI 환경에서는 Daemon을 사용하지 않는 것이 메모리 효율적
      - name: 🧪 Build and Run Tests
        run: ./gradlew build test --no-daemon

      # Step 6: 테스트 결과 리포트 업로드 (실패 시에도 업로드)
      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/
          retention-days: 7    # 7일 후 자동 삭제 (스토리지 절약)
